<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopSolid Automation Benchmark</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #00549F; /* Bleu TopSolid */
            --secondary-color: #f8f9fa;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #e9ecef; 
        }
        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        }
        header {
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }
        h1 { color: var(--primary-color); margin: 0; }
        p.subtitle { color: #666; }
        .chart-container {
            position: relative;
            margin: auto;
            height: 60vh;
            width: 100%;
        }
        .loading { text-align: center; font-style: italic; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TopSolid'Automation Benchmark</h1>
        <p class="subtitle">Comparatif de performance communautaire</p>
    </header>

    <div id="loader" class="loading">Chargement des données de benchmark...</div>
    
    <div class="chart-container">
        <canvas id="benchmarkChart"></canvas>
    </div>
</div>

<script>
    async function initBenchmark() {
        const loader = document.getElementById('loader');
        
        try {
            // Tentative de lecture du fichier JSON dans le même dossier
            const response = await fetch('benchmark_results.json');
            
            if (!response.ok) {
                throw new Error("Le fichier benchmark_results.json est introuvable.");
            }
            
            const data = await response.json();
            loader.style.display = 'none';
            renderChart(data);

        } catch (error) {
            loader.innerHTML = `<span style="color:red">Erreur : ${error.message}</span>`;
            console.error("Détails de l'erreur:", error);
        }
    }

    function renderChart(benchData) {
        const ctx = document.getElementById('benchmarkChart').getContext('2d');
        
        // Extraction des étiquettes (Config PC) et des valeurs
        const labels = benchData.map(d => `${d.cpu} | ${d.gpu}`);
        const rebuildTimes = benchData.map(d => d.results.rebuildTimeSec);
        const openTimes = benchData.map(d => d.results.openTimeSec);

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Reconstruction (sec)',
                        data: rebuildTimes,
                        backgroundColor: 'rgba(0, 84, 159, 0.7)',
                        borderColor: 'rgba(0, 84, 159, 1)',
                        borderWidth: 1
                    },
                    {
                        label: 'Ouverture (sec)',
                        data: openTimes,
                        backgroundColor: 'rgba(255, 159, 64, 0.7)',
                        borderColor: 'rgba(255, 159, 64, 1)',
                        borderWidth: 1
                    }
                ]
            },
            options: {
                indexAxis: 'y', // Barres horizontales
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { 
                        beginAtZero: true,
                        title: { display: true, text: 'Temps en secondes (plus court est mieux)' }
                    }
                },
                plugins: {
                    legend: { position: 'top' },
                    tooltip: { mode: 'index', intersect: false }
                }
            }
        });
    }

    // Lancement au chargement de la page
    initBenchmark();
</script>

</body>
</html>
