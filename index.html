<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopSolid'OpenData - Benchmark Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Modern, clean dashboard styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

            .header h1 {
                color: #0056b3;
                margin-bottom: 5px;
            }
        /* Grid layout for the charts */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .chart-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

            .chart-card h2 {
                font-size: 1.2rem;
                margin-top: 0;
                color: #444;
                text-align: center;
                border-bottom: 2px solid #eee;
                padding-bottom: 10px;
            }
        /* Full width for the leaderboard */
        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>TopSolid'OpenData Performance Dashboard</h1>
        <p>Community-driven benchmark results across different hardware and TopSolid versions.</p>
    </div>

    <div class="dashboard-grid">
        <div class="chart-card">
            <h2>Average Time per Scenario (Seconds)</h2>
            <canvas id="scenarioChart"></canvas>
        </div>

        <div class="chart-card">
            <h2>Version Comparison: Import STEP</h2>
            <canvas id="versionChart"></canvas>
        </div>

        <div class="chart-card full-width">
            <h2>CPU Leaderboard: Import STEP (Lower is better)</h2>
            <canvas id="cpuChart"></canvas>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. DATA FETCHING
        // ==========================================
        async function loadDashboardData() {
            try {
                const response = await fetch('dashboard_data.json');
                const data = await response.json();
                renderCharts(data);
            } catch (error) {
                console.error("Error loading JSON. Make sure you are using a local web server (like VS Code Live Server).", error);
                alert("Could not load dashboard_data.json. Check console for details.");
            }
        }

        // ==========================================
        // 2. DATA PROCESSING & CHART RENDERING
        // ==========================================
        function renderCharts(data) {

            // --- Helper: Convert MS to Seconds ---
            const msToSec = (ms) => (ms / 1000).toFixed(1);

            // -------------------------------------------------------------
            // CHART 1: Average Time per Scenario (Doughnut)
            // -------------------------------------------------------------
            const scenarios = [...new Set(data.map(d => d.ScenarioName))];
            const scenarioAverages = scenarios.map(scenario => {
                const records = data.filter(d => d.ScenarioName === scenario);
                const avgMs = records.reduce((sum, r) => sum + r.ExecutionTimeMs, 0) / records.length;
                return msToSec(avgMs);
            });

            new Chart(document.getElementById('scenarioChart'), {
                type: 'doughnut',
                data: {
                    labels: scenarios,
                    datasets: [{
                        data: scenarioAverages,
                        backgroundColor: ['#36A2EB', '#FF6384', '#FFCE56', '#4BC0C0']
                    }]
                }
            });

            // -------------------------------------------------------------
            // CHART 2: Version Comparison for "Import STEP" (Bar)
            // -------------------------------------------------------------
            // Filter only the heavy import scenario
            const importData = data.filter(d => d.ScenarioId === "003_INT_ImportStep");
            const versions = [...new Set(importData.map(d => d.TsVersion))].sort();

            const versionAverages = versions.map(v => {
                const records = importData.filter(d => d.TsVersion === v);
                const avgMs = records.reduce((sum, r) => sum + r.ExecutionTimeMs, 0) / records.length;
                return msToSec(avgMs);
            });

            new Chart(document.getElementById('versionChart'), {
                type: 'bar',
                data: {
                    labels: versions,
                    datasets: [{
                        label: 'Avg Execution Time (Seconds)',
                        data: versionAverages,
                        backgroundColor: '#36A2EB'
                    }]
                },
                options: {
                    scales: { y: { beginAtZero: true } }
                }
            });

            // -------------------------------------------------------------
            // CHART 3: CPU Leaderboard for "Import STEP" (Horizontal Bar)
            // -------------------------------------------------------------
            // Group by CPU Model for the Import scenario
            const cpuGroups = {};
            importData.forEach(d => {
                if (!cpuGroups[d.CpuModel]) {
                    cpuGroups[d.CpuModel] = { totalMs: 0, count: 0, isLaptop: d.IsLaptop };
                }
                cpuGroups[d.CpuModel].totalMs += d.ExecutionTimeMs;
                cpuGroups[d.CpuModel].count += 1;
            });

            // Calculate averages and sort from fastest to slowest
            const cpuLeaderboard = Object.keys(cpuGroups).map(cpu => {
                return {
                    cpu: cpu,
                    avgSec: parseFloat(msToSec(cpuGroups[cpu].totalMs / cpuGroups[cpu].count)),
                    isLaptop: cpuGroups[cpu].isLaptop
                };
            }).sort((a, b) => a.avgSec - b.avgSec); // Ascending sort (Lower time = better)

            new Chart(document.getElementById('cpuChart'), {
                type: 'bar',
                data: {
                    labels: cpuLeaderboard.map(c => c.cpu),
                    datasets: [{
                        label: 'Execution Time (Seconds) - Lower is Better',
                        data: cpuLeaderboard.map(c => c.avgSec),
                        // Color laptops differently from desktops for quick visual cues
                        backgroundColor: cpuLeaderboard.map(c => c.isLaptop ? '#FF9F40' : '#4BC0C0')
                    }]
                },
                options: {
                    indexAxis: 'y', // Makes the bar chart horizontal
                    scales: { x: { beginAtZero: true } },
                    plugins: {
                        legend: { display: false } // Hide legend since colors represent form factor
                    }
                }
            });
        }

        // ==========================================
        // 3. INITIALIZATION
        // ==========================================
        loadDashboardData();
    </script>
</body>
</html>
